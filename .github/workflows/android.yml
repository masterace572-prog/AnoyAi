name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Build with Gradle
      run: |
        # Install a modern version of Gradle since we don't have the wrapper jar
        # Gradle 8.6 is required for AGP 8.4.0
        sudo apt-get update
        sudo apt-get install -y gradle
        # If the system gradle is too old, we use a manual install
        if gradle -v | grep -q "4.4"; then
          echo "System gradle is too old, installing Gradle 8.6 manually..."
          wget -q https://services.gradle.org/distributions/gradle-8.6-bin.zip
          sudo unzip -d /opt/gradle gradle-8.6-bin.zip
          echo "export PATH=/opt/gradle/gradle-8.6/bin:\$PATH" >> ~/.bashrc
          export PATH=/opt/gradle/gradle-8.6/bin:$PATH
        fi
        gradle :app:assembleDebug
