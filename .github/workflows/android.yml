name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Install Android SDK Components
      run: |
        # Use the pre-installed Android SDK on GitHub runners
        export ANDROID_HOME=$ANDROID_SDK_ROOT
        # Accept licenses and install required components
        yes | sdkmanager --licenses
        sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

    - name: Build with Gradle
      run: |
        # Ensure we use the system Android SDK
        export ANDROID_HOME=$ANDROID_SDK_ROOT
        
        # Install Gradle 8.6
        wget -q https://services.gradle.org/distributions/gradle-8.6-bin.zip
        unzip -q gradle-8.6-bin.zip
        export PATH=$PWD/gradle-8.6/bin:$PATH
        
        gradle :app:assembleDebug
